<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWELL Dodgers — Game Night Lineup</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #005A9C;
    --blue-dark: #003D6B;
    --blue-deep: #002244;
    --red: #EF3E42;
    --red-dark: #C0282C;
    --white: #FFFFFF;
    --cream: #F5F0E8;
    --tan: #E8DFD0;
    --gold: #D4A843;
    --gray-light: #D1C9BC;
    --gray-mid: #8A8070;
    --gray-dark: #4A4540;
    --green-field: #2D6A30;
    --green-light: #4A9E4E;
    --dirt: #C4A66A;
    --shadow: rgba(0,34,68,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--gray-dark);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 60%, var(--blue-dark) 100%);
    color: var(--white);
    padding: 28px 32px 20px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -10%;
    width: 120%; height: 200%;
    background: repeating-linear-gradient(
      120deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.02) 30px,
      rgba(255,255,255,0.02) 60px
    );
  }
  .header-content {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
  }
  .team-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
  }
  .team-name span { color: var(--gold); }
  .game-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pitching-plan {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pitch-chip {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.85);
  }
  .pitch-chip b { color: var(--gold); font-weight: 600; }

  /* TABS */
  .tab-bar {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    padding: 0 32px;
    gap: 0;
    background: var(--blue-deep);
  }
  .tab-btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    background: transparent;
    border: none;
    padding: 12px 24px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .tab-btn.active {
    color: var(--white);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 12px; right: 12px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px 2px 0 0;
  }

  /* MAIN */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* INNING TAB */
  .inning-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .inn-btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 18px;
    width: 52px;
    height: 52px;
    border-radius: 10px;
    border: 2px solid var(--gray-light);
    background: var(--white);
    color: var(--gray-mid);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    line-height: 1;
  }
  .inn-btn small {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.7;
  }
  .inn-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .inn-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(0,90,156,0.35);
  }

  /* DIAMOND */
  .diamond-wrapper {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 16px var(--shadow);
    margin-bottom: 24px;
  }
  .diamond-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--blue-dark);
    margin-bottom: 4px;
  }
  .diamond-subtitle {
    font-size: 12px;
    color: var(--gray-mid);
    margin-bottom: 16px;
  }

  .diamond-field {
    position: relative;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    aspect-ratio: 1.15;
  }

  .field-bg {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    overflow: hidden;
    background: var(--green-field);
  }
  .field-bg .outfield-arc {
    position: absolute;
    bottom: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 130%;
    height: 90%;
    border-radius: 50%;
    background: var(--green-light);
  }
  .field-bg .infield-diamond {
    position: absolute;
    bottom: 8%;
    left: 50%;
    width: 42%;
    height: 42%;
    transform: translateX(-50%) rotate(45deg);
    background: var(--dirt);
    border-radius: 4px;
  }
  .field-bg .mound {
    position: absolute;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 18px;
    background: var(--dirt);
    border-radius: 50%;
  }
  .field-bg .home-plate {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 14px;
    background: var(--white);
    clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
  }

  .player-dot {
    position: absolute;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
    transition: all 0.3s ease;
  }
  .player-dot .dot-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--white);
    border: 2.5px solid var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 3px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: var(--blue-dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .player-dot .dot-circle.pitcher { border-color: var(--red); background: var(--red); color: var(--white); }
  .player-dot .dot-circle.catcher { border-color: var(--gold); background: var(--gold); color: var(--blue-deep); }
  .player-dot .dot-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  /* SITTING PANEL */
  .sitting-panel {
    background: var(--white);
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 2px 16px var(--shadow);
  }
  .sitting-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray-mid);
    margin-bottom: 10px;
  }
  .sitting-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sit-chip {
    background: var(--tan);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-dark);
  }

  /* ROSTER TAB */
  .roster-table-wrap {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 16px var(--shadow);
    overflow-x: auto;
  }
  .roster-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .roster-table thead th {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 12px;
    padding: 10px 8px;
    text-align: center;
    background: var(--blue-deep);
    color: var(--white);
    position: sticky;
    top: 0;
  }
  .roster-table thead th:first-child {
    text-align: left;
    border-radius: 8px 0 0 0;
    padding-left: 14px;
    min-width: 140px;
  }
  .roster-table thead th:last-child {
    border-radius: 0 8px 0 0;
  }
  .roster-table tbody td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid var(--tan);
    font-weight: 600;
  }
  .roster-table tbody td:first-child {
    text-align: left;
    padding-left: 14px;
    font-weight: 700;
    color: var(--blue-dark);
  }
  .roster-table tbody tr:hover { background: rgba(0,90,156,0.04); }
  .roster-table tbody tr:last-child td { border-bottom: none; }

  .pos-cell { border-radius: 4px; padding: 4px 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
  .pos-p { background: #FDECEC; color: var(--red-dark); }
  .pos-c { background: #FFF5DC; color: #8B6914; }
  .pos-if { background: #E8F0FE; color: var(--blue-dark); }
  .pos-of { background: #E8F5E9; color: var(--green-field); }
  .pos-sit { background: var(--tan); color: var(--gray-mid); font-style: italic; }

  /* PLAYER RECAP TAB */
  .player-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .player-card {
    background: var(--white);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .player-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px var(--shadow);
  }
  .player-card-header {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 100%);
    color: var(--white);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pc-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.5px;
  }
  .pc-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .player-card-body { padding: 16px 18px; }
  .pc-role {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--red);
    margin-bottom: 10px;
  }
  .pc-innings {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .pc-inn {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
  }
  .pc-inn.playing { background: #E8F0FE; color: var(--blue-dark); }
  .pc-inn.sitting { background: var(--tan); color: var(--gray-mid); }
  .pc-inn.pitching { background: #FDECEC; color: var(--red-dark); }
  .pc-inn.catching { background: #FFF5DC; color: #8B6914; }

  .pc-notes {
    font-size: 12px;
    color: var(--gray-mid);
    line-height: 1.6;
    border-top: 1px solid var(--tan);
    padding-top: 10px;
  }
  .pc-notes strong { color: var(--gray-dark); }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .header { padding: 20px 16px 16px; }
    .team-name { font-size: 26px; }
    .tab-bar { padding: 0 16px; }
    .tab-btn { padding: 10px 14px; font-size: 12px; }
    .main { padding: 16px 16px 40px; }
    .inn-btn { width: 44px; height: 44px; font-size: 16px; }
    .diamond-wrapper { padding: 16px; }
    .player-dot .dot-circle { width: 34px; height: 34px; font-size: 9px; }
    .player-dot .dot-name { font-size: 8px; }
    .player-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="team-name">CWELL <span>Dodgers</span></div>
    <div class="game-subtitle">Game Night Lineup Card</div>
    <div class="pitching-plan">
      <div class="pitch-chip"><b>Inn 1–3:</b>&nbsp; Nathan Fisk</div>
      <div class="pitch-chip"><b>Inn 4:</b>&nbsp; Ethan Diamond</div>
      <div class="pitch-chip"><b>Inn 5+:</b>&nbsp; Gabe / Ryan</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="innings">Innings</button>
  <button class="tab-btn" data-tab="roster">Roster Overview</button>
  <button class="tab-btn" data-tab="recap">Player Recap</button>
</div>

<div class="main">

  <!-- INNINGS TAB -->
  <div class="tab-content active" id="tab-innings">
    <div class="inning-selector" id="inning-selector"></div>
    <div class="diamond-wrapper">
      <div class="diamond-title" id="diamond-title">Inning 1</div>
      <div class="diamond-subtitle" id="diamond-subtitle"></div>
      <div class="diamond-field" id="diamond-field">
        <div class="field-bg">
          <div class="outfield-arc"></div>
          <div class="infield-diamond"></div>
          <div class="mound"></div>
          <div class="home-plate"></div>
        </div>
      </div>
    </div>
    <div class="sitting-panel">
      <div class="sitting-title">🪑 On the Bench</div>
      <div class="sitting-chips" id="sitting-chips"></div>
    </div>
  </div>

  <!-- ROSTER TAB -->
  <div class="tab-content" id="tab-roster">
    <div class="roster-table-wrap">
      <table class="roster-table" id="roster-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>Inn 1</th>
            <th>Inn 2</th>
            <th>Inn 3</th>
            <th>Inn 4</th>
            <th>Inn 5</th>
            <th>Inn 6</th>
            <th>Inn 7</th>
          </tr>
        </thead>
        <tbody id="roster-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- PLAYER RECAP TAB -->
  <div class="tab-content" id="tab-recap">
    <div class="player-cards" id="player-cards"></div>
  </div>

</div>

<script>
const INNINGS = {
  1: {
    pitcher: "Nathan Fisk",
    lineup: {
      P:  "Nathan",
      C:  "Liam",
      "1B": "Nicky",
      "2B": "Ryan",
      "3B": "Brendan",
      SS: "Gabe",
      LF: "Arjun",
      CF: "Wesley",
      RF: "Ethan"
    },
    sit: ["Hayden", "Evan", "Nick"],
    note: "Nathan sets the tone. Gabe anchors SS. Nicky owns 1B."
  },
  2: {
    pitcher: "Nathan Fisk",
    lineup: {
      P:  "Nathan",
      C:  "Liam",
      "1B": "Evan",
      "2B": "Hayden",
      "3B": "Brendan",
      SS: "Gabe",
      LF: "Nick",
      CF: "Wesley",
      RF: "Arjun"
    },
    sit: ["Ethan", "Ryan", "Nicky"],
    note: "Hayden & Evan enter. All 3 from bench come in."
  },
  3: {
    pitcher: "Nathan Fisk",
    lineup: {
      P:  "Nathan",
      C:  "Liam",
      "1B": "Nicky",
      "2B": "Ryan",
      "3B": "Ethan",
      SS: "Gabe",
      LF: "Evan",
      CF: "Hayden",
      RF: "Nick"
    },
    sit: ["Wesley", "Arjun", "Brendan"],
    note: "Nathan's final inning. Ethan at 3B rated 5."
  },
  4: {
    pitcher: "Ethan Diamond",
    lineup: {
      P:  "Ethan",
      C:  "Hayden",
      "1B": "Nicky",
      "2B": "Arjun",
      "3B": "Brendan",
      SS: "Gabe",
      LF: "Wesley",
      CF: "Nick",
      RF: "Ryan"
    },
    sit: ["Nathan", "Liam", "Evan"],
    note: "Ethan takes the mound. Hayden catches (rated 5). Liam rests."
  },
  5: {
    pitcher: "Gabe / Ryan",
    lineup: {
      P:  "Gabe/Ryan",
      C:  "Liam",
      "1B": "Nicky",
      "2B": "Nathan",
      "3B": "Evan",
      SS: "Hayden",
      LF: "Wesley",
      CF: "Arjun",
      RF: "Brendan"
    },
    sit: ["Ethan", "Nick", "Gabe or Ryan"],
    note: "Liam returns behind the plate. Stacked infield."
  },
  6: {
    pitcher: "Gabe / Ryan",
    lineup: {
      P:  "Gabe/Ryan",
      C:  "Ethan",
      "1B": "Nicky",
      "2B": "Nathan",
      "3B": "Evan",
      SS: "Hayden",
      LF: "Nick",
      CF: "Wesley",
      RF: "Brendan"
    },
    sit: ["Liam", "Arjun", "Gabe or Ryan"],
    note: "Ethan behind the plate. Nick back in the lineup."
  },
  7: {
    pitcher: "TBD",
    lineup: {
      P:  "TBD",
      C:  "Liam",
      "1B": "Nicky",
      "2B": "Gabe/Ryan",
      "3B": "Hayden",
      SS: "Evan",
      LF: "Arjun",
      CF: "Wesley",
      RF: "Ethan"
    },
    sit: ["Nathan", "Nick", "Brendan"],
    note: "No run limit! Best defense on the field."
  }
};

const PLAYERS = {
  "Nathan":  { full: "Nathan Fisk",      role: "Starting Pitcher (Inn 1–3)" },
  "Liam":    { full: "Liam Hines",       role: "Primary Catcher" },
  "Ethan":   { full: "Ethan Diamond",    role: "Catcher / Pitcher (Inn 4)" },
  "Gabe":    { full: "Gabriel Orbach",   role: "Shortstop / Closer Option" },
  "Ryan":    { full: "Ryan Stupak",      role: "Utility / Closer Option" },
  "Nicky":   { full: "Nicky Dufalt",     role: "First Baseman" },
  "Wesley":  { full: "Wesley Lubnow",    role: "Center Field / Speed" },
  "Brendan": { full: "Brendan Reynolds", role: "Corner Infield / Outfield" },
  "Arjun":   { full: "Arjun Jani",       role: "Outfield (Left-Handed)" },
  "Nick":    { full: "Nick Kopic",       role: "Outfield" },
  "Hayden":  { full: "Hayden Cheng",     role: "Utility / Backup Catcher" },
  "Evan":    { full: "Evan Levine",      role: "Utility Infield/Outfield" }
};

// Position locations on the diamond (% based)
const POS_COORDS = {
  P:    { top: "52%", left: "50%" },
  C:    { top: "88%", left: "50%" },
  "1B": { top: "56%", left: "72%" },
  "2B": { top: "40%", left: "62%" },
  "3B": { top: "56%", left: "28%" },
  SS:   { top: "40%", left: "38%" },
  LF:   { top: "18%", left: "18%" },
  CF:   { top: "6%",  left: "50%" },
  RF:   { top: "18%", left: "82%" }
};

function getPlayerPos(playerName, inning) {
  const inn = INNINGS[inning];
  for (const [pos, name] of Object.entries(inn.lineup)) {
    if (name === playerName) return pos;
  }
  if (inn.sit.some(s => s === playerName || s.includes(playerName))) return "SIT";
  // Handle Gabe/Ryan combo
  if (playerName === "Gabe" || playerName === "Ryan") {
    if (inn.lineup.P === "Gabe/Ryan") return "P*";
    if (inn.lineup["2B"] === "Gabe/Ryan") return "2B*";
    if (inn.sit.includes("Gabe or Ryan")) return "SIT*";
  }
  return "—";
}

function posClass(pos) {
  if (pos === "P" || pos === "P*") return "pos-p";
  if (pos === "C") return "pos-c";
  if (pos === "SIT" || pos === "SIT*") return "pos-sit";
  if (["LF","CF","RF"].includes(pos)) return "pos-of";
  return "pos-if";
}

function posLabel(pos) {
  if (pos === "SIT") return "BENCH";
  if (pos === "SIT*") return "BENCH*";
  if (pos === "P*") return "P / BENCH";
  if (pos === "2B*") return "2B / SS";
  return pos;
}

// BUILD INNING SELECTOR
const selectorEl = document.getElementById('inning-selector');
for (let i = 1; i <= 7; i++) {
  const btn = document.createElement('button');
  btn.className = 'inn-btn' + (i === 1 ? ' active' : '');
  btn.innerHTML = `<small>Inn</small>${i}`;
  btn.dataset.inning = i;
  btn.addEventListener('click', () => selectInning(i));
  selectorEl.appendChild(btn);
}

function selectInning(n) {
  document.querySelectorAll('.inn-btn').forEach(b => b.classList.toggle('active', +b.dataset.inning === n));
  renderDiamond(n);
}

function renderDiamond(n) {
  const inn = INNINGS[n];
  document.getElementById('diamond-title').textContent = `Inning ${n}`;
  document.getElementById('diamond-subtitle').textContent = `Pitching: ${inn.pitcher} — ${inn.note}`;

  const field = document.getElementById('diamond-field');
  field.querySelectorAll('.player-dot').forEach(d => d.remove());

  for (const [pos, name] of Object.entries(inn.lineup)) {
    if (pos === "P" && (name === "Gabe/Ryan" || name === "TBD")) {
      makeDot(field, pos, name, true, false);
    } else if (pos === "C") {
      makeDot(field, pos, name, false, true);
    } else if (pos === "P") {
      makeDot(field, pos, name, true, false);
    } else {
      makeDot(field, pos, name, false, false);
    }
  }

  const chips = document.getElementById('sitting-chips');
  chips.innerHTML = '';
  inn.sit.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'sit-chip';
    const pData = PLAYERS[name];
    chip.textContent = pData ? pData.full : name;
    chips.appendChild(chip);
  });
}

function makeDot(container, pos, name, isPitcher, isCatcher) {
  const coords = POS_COORDS[pos];
  if (!coords) return;
  const dot = document.createElement('div');
  dot.className = 'player-dot';
  dot.style.top = coords.top;
  dot.style.left = coords.left;
  const circleClass = isPitcher ? 'pitcher' : isCatcher ? 'catcher' : '';
  dot.innerHTML = `
    <div class="dot-circle ${circleClass}">${pos}</div>
    <div class="dot-name">${name}</div>
  `;
  container.appendChild(dot);
}

// BUILD ROSTER TABLE
function buildRoster() {
  const tbody = document.getElementById('roster-tbody');
  const playerOrder = ["Nathan","Liam","Ethan","Gabe","Ryan","Nicky","Wesley","Brendan","Arjun","Nick","Hayden","Evan"];
  playerOrder.forEach(name => {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.textContent = PLAYERS[name].full;
    tr.appendChild(td0);
    for (let i = 1; i <= 7; i++) {
      const td = document.createElement('td');
      const pos = getPlayerPos(name, i);
      const span = document.createElement('span');
      span.className = `pos-cell ${posClass(pos)}`;
      span.textContent = posLabel(pos);
      td.appendChild(span);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

// BUILD PLAYER RECAP
function buildRecap() {
  const container = document.getElementById('player-cards');
  const playerOrder = ["Nathan","Liam","Ethan","Gabe","Ryan","Nicky","Wesley","Brendan","Arjun","Nick","Hayden","Evan"];

  const recapNotes = {
    "Nathan": "Starts on the mound innings 1–3, then moves to 2B (rated 5) for innings 5–6. Gets a deserved rest in innings 4 and 7 after carrying the pitching load.",
    "Liam": "Behind the plate for innings 1–3 and 5. Hayden spells him in inning 4 so he comes back fresh. Returns to catch the 7th if we get there.",
    "Ethan": "RF in inning 1, 3B in inning 3, then takes the mound in inning 4. Catches innings 5–6. Sits innings 2 and 5 — never back-to-back.",
    "Gabe": "Anchors SS for innings 1–4. Takes the mound or plays infield in innings 5+ depending on the score. Your most versatile weapon.",
    "Ryan": "Starts at 2B innings 1 and 3, RF in inning 4. Either pitches or plays infield in innings 5+. Sits innings 2 and 4 — spread out nicely.",
    "Nicky": "First base all day, every day. That's his house — rated 5 there. Gets his one bench inning in the 2nd. Plays all other innings at 1B.",
    "Wesley": "Speed demon in CF. Covers ground nobody else can. Sits inning 3 for his breather, otherwise roaming center every inning he's out there.",
    "Brendan": "3B in innings 1–2 and 4, RF in innings 5–6. Sits inning 3. Steady glove wherever you put him.",
    "Arjun": "Left-handed bat. LF/RF rotation. Sits innings 3 and 6. Gets his 2B work in inning 4. Solid outfield coverage.",
    "Nick": "Comes off the bench in inning 2 (LF). Outfield role in innings 3–4 and 6. Sits innings 1 and 5. Gets plenty of time on the grass.",
    "Hayden": "Enters inning 2 at 2B, then CF in inning 3. Big moment: catches inning 4 when Ethan pitches (rated 5 behind the plate). SS in innings 5–6, 3B in 7.",
    "Evan": "Enters inning 2 at 3B. Bounces between 3B, LF, and SS. Athletic enough to play anywhere. Sits innings 1 and 4, never back-to-back."
  };

  playerOrder.forEach(name => {
    const p = PLAYERS[name];
    const card = document.createElement('div');
    card.className = 'player-card';

    // Count innings played
    let played = 0, sat = 0;
    for (let i = 1; i <= 7; i++) {
      const pos = getPlayerPos(name, i);
      if (pos === "SIT" || pos === "SIT*") sat++;
      else played++;
    }

    card.innerHTML = `
      <div class="player-card-header">
        <div class="pc-name">${p.full}</div>
        <div class="pc-badge">${played} INN</div>
      </div>
      <div class="player-card-body">
        <div class="pc-role">${p.role}</div>
        <div class="pc-innings">
          ${[1,2,3,4,5,6,7].map(i => {
            const pos = getPlayerPos(name, i);
            let cls = 'playing';
            if (pos === 'SIT' || pos === 'SIT*') cls = 'sitting';
            else if (pos === 'P' || pos === 'P*') cls = 'pitching';
            else if (pos === 'C') cls = 'catching';
            return `<div class="pc-inn ${cls}" title="Inning ${i}">${pos === 'SIT' || pos === 'SIT*' ? '—' : posLabel(pos)}</div>`;
          }).join('')}
        </div>
        <div class="pc-notes">${recapNotes[name] || ''}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

// TAB SWITCHING
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

// INIT
renderDiamond(1);
buildRoster();
buildRecap();
</script>
